name: Update Filters

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      VERSION: placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set version
        run: echo "VERSION=$(date -u +%Y.%m.%d)" >> "$GITHUB_ENV"

      - name: Download and compile filter lists
        run: npm run build:filters

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated filters
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/rules/ public/cosmetic-filters.json
          git commit -m "chore: update filter lists ${{ env.VERSION }}"

      - name: Build and test
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm test
          npm run build:chrome

      - name: Tag and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin main
          git push origin "v${{ env.VERSION }}"

      - name: Package Chrome extension
        if: steps.diff.outputs.changed == 'true'
        run: |
          cd .output/chrome-mv3
          zip -r "../../adblocky-chrome-v${{ env.VERSION }}.zip" .

      - name: Create GitHub Release
        if: steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: adblocky-chrome-v${{ env.VERSION }}.zip
          body: "Daily filter list update — ${{ env.VERSION }}"
          draft: false
          prerelease: false
